services:
  # Backend API Service (API only, no frontend)
  - type: web
    name: proxymukt-backend
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://proxymukt.onrender.com
      # Add these in Render dashboard:
      # - JWT_SECRET
      # - JWT_ACCESS_SECRET
      # - JWT_REFRESH_SECRET
      # - QR_SECRET  
      # - MONGODB_URI
    healthCheckPath: /health