services:
  - type: web
    name: proxymukt
    env: node
    plan: free
    buildCommand: cd client && npm install && VITE_API_URL=$VITE_API_URL npm run build && cd ../server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VITE_API_URL
        value: https://proxymuktbackend.onrender.com/api
      - key: CLIENT_URL
        value: https://proxymukt.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /api/*
        destination: /api/*
      - type: rewrite
        source: /favicon.ico
        destination: /logo.svg
      - type: rewrite
        source: /*
        destination: /index.html