services:
  # Combined Backend + Frontend Service
  - type: web
    name: proxymukt-backend
    env: node
    plan: free
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://proxymuktbackend.onrender.com
      # Add these in Render dashboard:
      # - JWT_SECRET
      # - QR_SECRET  
      # - MONGODB_URI
    healthCheckPath: /health